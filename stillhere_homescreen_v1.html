
<style>
* { margin:0; padding:0; box-sizing:border-box; }

.scene {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem 1rem 2rem;
  background: #111;
  border-radius: 20px;
}

.phone {
  width: 300px;
  height: 640px;
  border-radius: 48px;
  overflow: hidden;
  position: relative;
  border: 1.5px solid rgba(255,255,255,0.12);
  display: flex;
  flex-direction: column;
  transition: background 1.8s ease;
}

.bg-layer {
  position: absolute;
  inset: 0;
  z-index: 0;
  transition: opacity 1.8s ease;
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.statusbar {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px 0;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  font-family: sans-serif;
  font-weight: 400;
  flex-shrink: 0;
}

.top {
  padding: 18px 24px 0;
  flex-shrink: 0;
}

.app-name {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  font-family: sans-serif;
  font-weight: 400;
  margin-bottom: 8px;
}

.street-title {
  font-family: Georgia, serif;
  font-size: 36px;
  color: #fff;
  line-height: 1.05;
  font-weight: 400;
  font-style: italic;
}

.dateline {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
  font-family: sans-serif;
  font-weight: 300;
}

.mood-area {
  padding: 22px 24px 0;
  flex-shrink: 0;
}

.mood-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.orb {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  animation: breathe 4s ease-in-out infinite;
  transition: background 1.8s ease, box-shadow 1.8s ease;
}

@keyframes breathe {
  0%,100% { transform: scale(1); opacity:0.9; }
  50% { transform: scale(1.08); opacity:1; }
}

.mood-text { font-family: sans-serif; }

.mood-name {
  font-size: 18px;
  color: #fff;
  font-weight: 300;
  letter-spacing: 0.04em;
}

.mood-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 3px;
  font-weight: 300;
  line-height: 1.4;
}

.quote-wrap {
  margin: 20px 24px 0;
  padding-left: 14px;
  border-left: 1px solid rgba(255,255,255,0.18);
  flex-shrink: 0;
}

.quote {
  font-family: Georgia, serif;
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
  font-style: italic;
}

.spacer { flex: 1; min-height: 12px; }

.street-nav {
  flex-shrink: 0;
  position: relative;
  height: 80px;
  overflow: hidden;
}

.trace-pill {
  margin: 0 16px 10px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.trace-left { font-family: sans-serif; }
.trace-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  display: block;
  margin-bottom: 2px;
}
.trace-text {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 300;
}

.swipe-hints {
  display: flex;
  justify-content: space-between;
  padding: 0 28px;
  margin-bottom: 4px;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  font-family: sans-serif;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.emotion-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding-bottom: 14px;
  flex-shrink: 0;
}

.edot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
  border: none;
}
.edot.active {
  background: rgba(255,255,255,0.7);
  transform: scale(1.3);
}
</style>

<div class="scene">
  <div class="phone" id="phone">

    <canvas id="bgCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;"></canvas>

    <div class="content">
      <div class="statusbar">
        <span>9:41</span>
        <span id="statusDots">· · ·</span>
      </div>

      <div class="top">
        <div class="app-name">Still Here</div>
        <div class="street-title">Elsewhere<br>Lane</div>
        <div class="dateline">Monday, April 6, 2026</div>
      </div>

      <div class="mood-area">
        <div class="mood-row">
          <div class="orb" id="orb"></div>
          <div class="mood-text">
            <div class="mood-name" id="moodName">Melancholic</div>
            <div class="mood-sub" id="moodSub">Little movement.<br>The street remembers.</div>
          </div>
        </div>
      </div>

      <div class="quote-wrap">
        <div class="quote" id="quoteEl">
          "No one said my name today. I count the shadows of those who almost came."
        </div>
      </div>

      <div class="spacer"></div>

      <div class="trace-pill">
        <div class="trace-left">
          <span class="trace-label">Last trace</span>
          <span class="trace-text" id="traceText">Someone paused. 4 min ago.</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
          <circle cx="8" cy="8" r="2" fill="rgba(255,255,255,0.35)"/>
        </svg>
      </div>

      <div class="swipe-hints">
        <span>← traces</span>
        <span>feed →</span>
      </div>

      <svg class="street-nav" id="streetSvg" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:80px;flex-shrink:0;">
        <rect x="0" y="0" width="300" height="80" fill="rgba(0,0,0,0.35)"/>
        <rect x="0" y="28" width="300" height="52" fill="rgba(15,12,10,0.7)"/>
        <line x1="0" y1="28" x2="300" y2="28" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line x1="150" y1="30" x2="150" y2="80" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8,7"/>
        <rect x="0" y="0" width="42" height="28" fill="rgba(8,8,12,0.85)" rx="1"/>
        <rect x="48" y="4" width="30" height="24" fill="rgba(8,8,12,0.8)" rx="1"/>
        <rect x="84" y="0" width="36" height="28" fill="rgba(10,8,12,0.9)" rx="1"/>
        <rect x="126" y="6" width="28" height="22" fill="rgba(8,8,10,0.75)" rx="1"/>
        <rect x="160" y="2" width="38" height="26" fill="rgba(10,10,14,0.85)" rx="1"/>
        <rect x="204" y="0" width="32" height="28" fill="rgba(8,8,12,0.8)" rx="1"/>
        <rect x="242" y="5" width="34" height="23" fill="rgba(10,8,10,0.85)" rx="1"/>
        <rect x="280" y="0" width="20" height="28" fill="rgba(8,8,12,0.75)" rx="1"/>
        <rect x="5" y="10" width="5" height="6" fill="rgba(255,220,80,0.08)" rx="0.5"/>
        <rect x="18" y="8" width="5" height="6" fill="rgba(255,220,80,0.04)" rx="0.5"/>
        <rect x="56" y="9" width="4" height="5" fill="rgba(255,220,80,0.1)" rx="0.5"/>
        <rect x="170" y="8" width="5" height="6" fill="rgba(255,220,80,0.06)" rx="0.5"/>
        <rect x="248" y="9" width="4" height="5" fill="rgba(255,220,80,0.08)" rx="0.5"/>
        <line x1="70" y1="28" x2="70" y2="55" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
        <circle cx="70" cy="26" r="2" fill="rgba(255,220,80,0.2)"/>
        <line x1="220" y1="28" x2="220" y2="55" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
        <circle cx="220" cy="26" r="2" fill="rgba(255,220,80,0.1)"/>
        <text x="150" y="68" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.15)" font-family="sans-serif" letter-spacing="3">— — —</text>
      </svg>

      <div class="emotion-dots">
        <button class="edot active" onclick="setMood(0)" title="Melancholic"></button>
        <button class="edot" onclick="setMood(1)" title="Restless"></button>
        <button class="edot" onclick="setMood(2)" title="Numb"></button>
        <button class="edot" onclick="setMood(3)" title="Peaceful"></button>
        <button class="edot" onclick="setMood(4)" title="Overwhelmed"></button>
        <button class="edot" onclick="setMood(5)" title="Hopeful"></button>
      </div>
    </div>
  </div>
</div>

<script>
const moods = [
  {
    name: 'Melancholic',
    sub: 'Little movement.\nThe street remembers.',
    quote: '"No one said my name today. I count the shadows of those who almost came."',
    trace: 'Someone paused. 4 min ago.',
    c1: '#1a1228', c2: '#2d1b3d', c3: '#120d1f',
    orb: 'radial-gradient(circle at 38% 38%, #9b6abf, #2c0f3a)',
    glow: 'rgba(130,80,180,0.35)'
  },
  {
    name: 'Restless',
    sub: 'Someone passed twice.\nThen disappeared.',
    quote: '"I sense that something should be decided. But no one decides."',
    trace: 'Quick footsteps. Direction: away.',
    c1: '#1e0d00', c2: '#3d1a00', c3: '#150800',
    orb: 'radial-gradient(circle at 38% 38%, #d4722a, #5c1a00)',
    glow: 'rgba(200,100,30,0.4)'
  },
  {
    name: 'Numb',
    sub: 'No signal. 9 days\nof digital absence.',
    quote: '"I am no longer sure if I am being avoided or simply forgotten."',
    trace: 'No activity recorded today.',
    c1: '#090909', c2: '#111111', c3: '#050505',
    orb: 'radial-gradient(circle at 38% 38%, #444, #111)',
    glow: 'rgba(80,80,80,0.2)'
  },
  {
    name: 'Peaceful',
    sub: 'A few familiar steps.\nRegular. Unhurried.',
    quote: '"She came again at the same hour. I did not need to ask why."',
    trace: 'Regular visitor. 08:42 this morning.',
    c1: '#071a12', c2: '#0d2b1e', c3: '#04100b',
    orb: 'radial-gradient(circle at 38% 38%, #2a8c5e, #062b18)',
    glow: 'rgba(40,140,90,0.3)'
  },
  {
    name: 'Overwhelmed',
    sub: 'After long absence —\na sudden flood.',
    quote: '"You all returned at once. I no longer recognize myself."',
    trace: '47 people in the last hour.',
    c1: '#1a0a00', c2: '#3d2200', c3: '#260d00',
    orb: 'radial-gradient(circle at 38% 38%, #e8a020, #7a2a00)',
    glow: 'rgba(230,150,20,0.45)'
  },
  {
    name: 'Hopeful',
    sub: 'First return. Someone\nlingered at the corner.',
    quote: '"A child looked up at my windows. I held very still."',
    trace: 'New visitor. Stood for 3 minutes.',
    c1: '#080f1a', c2: '#0f1e32', c3: '#050b14',
    orb: 'radial-gradient(circle at 38% 38%, #4a90d9, #0a2a5a)',
    glow: 'rgba(60,130,210,0.35)'
  }
];

let current = 0;
let animFrame;

function lerp(a, b, t) { return a + (b - a) * t; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let targetColors = { c1: hexToRgb(moods[0].c1), c2: hexToRgb(moods[0].c2), c3: hexToRgb(moods[0].c3) };
let currentColors = { ...targetColors };
let t = 1;

function drawBg() {
  const w = canvas.width, h = canvas.height;
  if (t < 1) {
    t = Math.min(1, t + 0.025);
    currentColors.c1 = currentColors.c1.map((v,i) => lerp(v, targetColors.c1[i], t));
    currentColors.c2 = currentColors.c2.map((v,i) => lerp(v, targetColors.c2[i], t));
    currentColors.c3 = currentColors.c3.map((v,i) => lerp(v, targetColors.c3[i], t));
  }
  const r1 = currentColors.c1.map(Math.round);
  const r2 = currentColors.c2.map(Math.round);
  const r3 = currentColors.c3.map(Math.round);
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, `rgb(${r1})`);
  grad.addColorStop(0.5, `rgb(${r2})`);
  grad.addColorStop(1, `rgb(${r3})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);
  animFrame = requestAnimationFrame(drawBg);
}

function resizeCanvas() {
  const phone = document.querySelector('.phone');
  canvas.width = phone.offsetWidth;
  canvas.height = phone.offsetHeight;
}

function setMood(idx) {
  current = idx;
  const m = moods[idx];
  document.getElementById('moodName').textContent = m.name;
  document.getElementById('moodSub').innerHTML = m.sub.replace('\n','<br>');
  document.getElementById('quoteEl').textContent = m.quote;
  document.getElementById('traceText').textContent = m.trace;
  document.getElementById('orb').style.background = m.orb;
  document.getElementById('orb').style.boxShadow = `0 0 18px ${m.glow}`;
  targetColors = {
    c1: hexToRgb(m.c1),
    c2: hexToRgb(m.c2),
    c3: hexToRgb(m.c3)
  };
  t = 0;
  document.querySelectorAll('.edot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

window.addEventListener('load', () => {
  resizeCanvas();
  setMood(0);
  drawBg();
});
</script>
